name: Deploy to Vercel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linter
      run: npm run lint
      
    - name: Build project
      run: npm run build
      
    - name: Check Vercel Configuration
      run: |
        echo "🔍 Verificando configuración de Vercel..."
        if [ -z "$VERCEL_TOKEN" ]; then
          echo "⚠️  VERCEL_TOKEN no configurado. El despliegue se saltará."
          echo "📋 Para configurar el despliegue automático:"
          echo "   1. Ve a Settings → Secrets → Actions en tu repositorio de GitHub"
          echo "   2. Agrega VERCEL_TOKEN con tu token de Vercel"
          echo "   3. Agrega ORG_ID con tu ID de organización"
          echo "   4. Agrega PROJECT_ID con tu ID de proyecto"
          exit 0
        else
          echo "✅ Variables de entorno configuradas correctamente"
        fi
      
    - name: Deploy to Vercel (Production)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.VERCEL_TOKEN != ''
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.ORG_ID }}
        vercel-project-id: ${{ secrets.PROJECT_ID }}
        vercel-args: '--prod'
        
    - name: Deploy to Vercel (Preview)
      if: github.event_name == 'pull_request' && env.VERCEL_TOKEN != ''
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.ORG_ID }}
        vercel-project-id: ${{ secrets.PROJECT_ID }}
        vercel-args: '--preview'
        
    - name: Deployment Skipped Notice
      if: env.VERCEL_TOKEN == ''
      run: |
        echo "📝 Despliegue omitido porque las variables de entorno no están configuradas."
        echo "📖 Consulta el archivo DEPLOY_VERCEL.md para instrucciones de configuración."
